# ============================================================
# Docker Compose — Local Kafka Development Environment
# ============================================================
#
# WHAT THIS GIVES YOU:
#   - Kafka (KRaft mode — no ZooKeeper!)  → localhost:9092
#   - Kafka UI                            → http://localhost:8080
#   - Schema Registry (Confluent)         → http://localhost:8081
#   - Kafka Connect                       → http://localhost:8083
#
# USAGE:
#   docker compose up -d          # Start all services
#   docker compose down -v        # Stop and remove volumes
#   docker compose logs -f kafka  # Tail Kafka logs
#
# PREREQUISITE: Docker Desktop ≥ 4.x (or any Docker with Compose v2)
# ============================================================

version: "3.8"

services:
  # ──────────────────────────────────────────────────────────
  # Kafka (KRaft mode — no ZooKeeper required)
  # Uses Confluent's kafka image (includes KRaft)
  # ──────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092" # Client connections (from host machine)
      - "9093:9093" # Internal controller (KRaft)
    environment:
      # ── KRaft mode (no ZooKeeper) ───────────────────────
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller # Combined broker+controller mode
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093 # Single node quorum

      # ── Listeners ───────────────────────────────────────
      # PLAINTEXT://kafka:29092  → used by services within Docker network
      # PLAINTEXT_HOST://0.0.0.0:9092 → used by host machine (localhost:9092)
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # ── Topic defaults ───────────────────────────────────
      KAFKA_NUM_PARTITIONS: 3 # Default partitions for auto-created topics
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1 # RF=1 for local dev (no data loss concern)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # ── Log retention (short for local dev) ─────────────
      KAFKA_LOG_RETENTION_HOURS: 2 # Keep logs for 2 hours in dev
      KAFKA_LOG_SEGMENT_BYTES: 10485760 # 10MB segments

      # ── Performance (relaxed for dev) ───────────────────
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: 10000
      KAFKA_LOG_FLUSH_INTERVAL_MS: 1000

      # ── Auto topic creation (enabled for dev ease) ──────
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # ── KRaft cluster ID (any UUID) ─────────────────────
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────────────────
  # Schema Registry
  # Enforces Avro/Protobuf/JSON Schema contracts
  # ──────────────────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: _schemas
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1

  # ──────────────────────────────────────────────────────────
  # Kafka Connect
  # Framework for source/sink connectors
  # ──────────────────────────────────────────────────────────
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.1
    container_name: kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: kafka-connect-cluster
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    volumes:
      - ./connect-plugins:/usr/share/confluent-hub-components # mount connector JARs

  # ──────────────────────────────────────────────────────────
  # Kafka UI (Provectus) — web-based topic/consumer management
  # Replaces the need for kafka-topics.sh CLI tools
  # Access at: http://localhost:8080
  # ──────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: kafka-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
      DYNAMIC_CONFIG_ENABLED: "true"
      # Enable topic management UI
      KAFKA_CLUSTERS_0_AUDIT_TOPICAUDITENABLED: "false"

# ──────────────────────────────────────────────────────────
# Named volumes for data persistence
# ──────────────────────────────────────────────────────────
volumes:
  kafka_data:
    driver: local
